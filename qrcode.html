<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科创项目孵化营 - 扫码访问</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    max-width: 380px;
  }
  .card h1 {
    font-size: 22px;
    color: #1f2937;
    margin-bottom: 6px;
  }
  .card p {
    font-size: 14px;
    color: #9ca3af;
    margin-bottom: 28px;
  }
  #qrcode {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  #qrcode canvas {
    border-radius: 12px;
    border: 4px solid #f3f4f6;
  }
  .url {
    font-size: 13px;
    color: #6366f1;
    background: #eef2ff;
    padding: 8px 16px;
    border-radius: 8px;
    word-break: break-all;
    user-select: all;
  }
  .note {
    margin-top: 16px;
    font-size: 12px;
    color: #d1d5db;
  }
</style>
</head>
<body>
<div class="card">
  <h1>科创项目孵化营</h1>
  <p>手机扫码，立即访问</p>
  <div id="qrcode"></div>
  <div class="url">http://10.15.40.57:4173</div>
  <p class="note">请确保手机与电脑在同一 Wi-Fi 网络下</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById('qrcode'), {
    text: 'http://10.15.40.57:4173',
    width: 220,
    height: 220,
    colorDark: '#1f2937',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
